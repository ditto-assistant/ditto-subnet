[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ditto-screening-protocol"
version = "0.3.0"
description = "Shared wire protocol for Ditto screening workers and platform APIs."
requires-python = ">=3.11,<3.14"
dependencies = ["pydantic>=2"]

[tool.hatch.build.targets.wheel]
packages = ["ditto_screening_protocol"]
