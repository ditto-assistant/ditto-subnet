# Complete SN118 validator stack. Configure the root .env, then run:
#   docker compose up -d
services:
  pylon:
    image: docker.io/backenddevelopersltd/bittensor-pylon@sha256:ba6ba5e3e7b32683f90039eb5a37a565d5479f034326b40288869f826f7362c7
    platform: linux/amd64
    restart: unless-stopped
    environment:
      # Pylon reuses the validator settings for its network, wallet, hotkey, and
      # netuid, so they are set once. One PYLON_TOKEN guards both the open-access
      # reads and the identity write.
      PYLON_BITTENSOR_NETWORK: ${SUBTENSOR_NETWORK:-finney}
      PYLON_BITTENSOR_ARCHIVE_NETWORK: ${SUBTENSOR_NETWORK:-finney}
      PYLON_OPEN_ACCESS_TOKEN: ${PYLON_TOKEN}
      PYLON_IDENTITIES: '["ditto"]'
      PYLON_ID_DITTO_WALLET_NAME: ${VALIDATOR_WALLET_NAME}
      PYLON_ID_DITTO_HOTKEY_NAME: ${VALIDATOR_WALLET_HOTKEY}
      PYLON_ID_DITTO_NETUID: ${NETUID}
      PYLON_ID_DITTO_TOKEN: ${PYLON_TOKEN}
      PYLON_DATABASE_PATH: /data/pylon.db
      PYLON_METRICS_TOKEN: ${PYLON_METRICS_TOKEN:-}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ~/.bittensor/wallets/:/root/.bittensor/wallets:ro
      - pylon-data:/data

  # The scorer receives an isolated rootless Docker daemon. Compromise of the
  # scorer or a miner sandbox cannot control the validator host daemon.
  sandbox-docker:
    build:
      context: .
      dockerfile: Dockerfile.sandbox-docker
    privileged: true
    environment:
      DOCKER_HOST: tcp://127.0.0.1:2375
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - sandbox-docker-data:/home/rootless/.local/share/docker
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 24

  # The embedding model the harness scores memory recall against. Runs on the
  # host network so the sandbox-docker socat forwarder can reach it at
  # host.docker.internal:11434. The model is pulled once into the volume.
  ollama:
    image: docker.io/ollama/ollama:0.6.8
    restart: unless-stopped
    network_mode: host
    volumes:
      - ollama-data:/root/.ollama
    entrypoint:
      - /bin/sh
      - -c
      - |
        /bin/ollama serve &
        until /bin/ollama list >/dev/null 2>&1; do sleep 1; done
        /bin/ollama pull embeddinggemma
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q embeddinggemma"]
      interval: 10s
      timeout: 5s
      retries: 30

  # The model-pinning gateway: fronts Chutes, forces the frozen Qwen3-32B model
  # and thinking mode, and keeps the Chutes key out of the sandbox. On the host
  # network so the socat forwarder reaches it at host.docker.internal:11435.
  model-relay:
    build:
      context: https://github.com/ditto-assistant/dittobench-api.git#4ee268309247ca4b497c4418df6640ed30b52cf0
      target: relay
    restart: unless-stopped
    network_mode: host
    environment:
      RELAY_API_KEY: ${RELAY_API_KEY:?set RELAY_API_KEY in .env}
      PORT: "11435"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  dittobench-api:
    build:
      # Pinned to the dittobench-api commit that freezes the model/provider/
      # thinking mode and adds the relay target (PR #24, squashed to main).
      context: https://github.com/ditto-assistant/dittobench-api.git#4ee268309247ca4b497c4418df6640ed30b52cf0
      target: sandbox
    restart: unless-stopped
    network_mode: service:sandbox-docker
    depends_on:
      sandbox-docker:
        condition: service_healthy
      model-relay:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://127.0.0.1:2375
      # The model id, provider, and thinking mode are frozen in dittobench-api's
      # code, not env. Only the gateway URLs (the host-side relay and Ollama,
      # reached via the sandbox-docker socat forwarder) are configurable.
      HARNESS_GATEWAY_URL: ${HARNESS_GATEWAY_URL:-http://host.docker.internal:11435}
      HARNESS_EMBED_URL: ${HARNESS_EMBED_URL:-http://host.docker.internal:11434}
      DITTOBENCH_SANDBOX_HARDEN: ${DITTOBENCH_SANDBOX_HARDEN:-1}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  ditto-subnet:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NETUID: ${NETUID}
      SUBTENSOR_NETWORK: ${SUBTENSOR_NETWORK:-finney}
      VALIDATOR_PLATFORM_API_URL: ${VALIDATOR_PLATFORM_API_URL}
      VALIDATOR_DITTOBENCH_API_URL: ${VALIDATOR_DITTOBENCH_API_URL}
      VALIDATOR_HOTKEY: ${VALIDATOR_HOTKEY}
      VALIDATOR_WALLET_NAME: ${VALIDATOR_WALLET_NAME}
      VALIDATOR_WALLET_HOTKEY: ${VALIDATOR_WALLET_HOTKEY}
      PYLON_URL: ${PYLON_URL:-http://pylon:8000}
      PYLON_IDENTITY_NAME: ${PYLON_IDENTITY_NAME:-ditto}
      PYLON_TOKEN: ${PYLON_TOKEN}
      VALIDATOR_RUN_SIZE: ${VALIDATOR_RUN_SIZE:-full}
      VALIDATOR_SWEEP_SECONDS: ${VALIDATOR_SWEEP_SECONDS:-120}
      VALIDATOR_EPOCH_SECONDS: ${VALIDATOR_EPOCH_SECONDS:-3600}
      VALIDATOR_QUEUE_LIMIT: ${VALIDATOR_QUEUE_LIMIT:-50}
      VALIDATOR_DITTOBENCH_POLL_SECONDS: ${VALIDATOR_DITTOBENCH_POLL_SECONDS:-10}
      VALIDATOR_DITTOBENCH_TIMEOUT_SECONDS: ${VALIDATOR_DITTOBENCH_TIMEOUT_SECONDS:-2400}
      VALIDATOR_HTTP_TIMEOUT_SECONDS: ${VALIDATOR_HTTP_TIMEOUT_SECONDS:-30}
      VALIDATOR_MIN_STAKE_TAO: ${VALIDATOR_MIN_STAKE_TAO:-0}
      VALIDATOR_DITTOBENCH_MOCK: ${VALIDATOR_DITTOBENCH_MOCK:-false}
      VALIDATOR_LOG_LEVEL: ${VALIDATOR_LOG_LEVEL:-INFO}
      WANDB_MODE: ${WANDB_MODE:-disabled}
      WANDB_PROJECT: ${WANDB_PROJECT:-ditto-sn118}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      WANDB_RUN_NAME: ${WANDB_RUN_NAME:-}
      UV_CACHE_DIR: /tmp/uv-cache
    depends_on:
      pylon:
        condition: service_started
      dittobench-api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
      # bittensor creates runtime directories (miners, metagraphs) on import;
      # keep them ephemeral while the wallet bind mount below stays read-only.
      - /root/.bittensor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ~/.bittensor/wallets/:/root/.bittensor/wallets:ro

volumes:
  pylon-data:
  sandbox-docker-data:
  ollama-data:
