# Complete SN118 validator stack. Configure the root .env, then run:
#   ./scripts/validator-compose.sh up -d
x-dittobench-build-context: &dittobench-build-context ${DITTOBENCH_BUILD_CONTEXT:-https://github.com/ditto-assistant/dittobench-api.git?ref=refs/heads/main&checksum=b96433d026b4d44b018051a5e85a36f17208a223}

services:
  pylon:
    image: docker.io/backenddevelopersltd/bittensor-pylon@sha256:ba6ba5e3e7b32683f90039eb5a37a565d5479f034326b40288869f826f7362c7
    platform: linux/amd64
    restart: unless-stopped
    environment:
      # This repository is SN118; netuid is not an operator setting. Pylon
      # reuses the validator settings for its network, wallet, and hotkey. One
      # PYLON_TOKEN guards both the open-access reads and the identity write.
      PYLON_BITTENSOR_NETWORK: ${SUBTENSOR_NETWORK:-finney}
      PYLON_BITTENSOR_ARCHIVE_NETWORK: ${SUBTENSOR_NETWORK:-finney}
      PYLON_OPEN_ACCESS_TOKEN: ${PYLON_TOKEN}
      PYLON_IDENTITIES: '["ditto"]'
      PYLON_ID_DITTO_WALLET_NAME: ${VALIDATOR_WALLET_NAME}
      PYLON_ID_DITTO_HOTKEY_NAME: ${VALIDATOR_WALLET_HOTKEY}
      PYLON_ID_DITTO_NETUID: "118"
      PYLON_ID_DITTO_TOKEN: ${PYLON_TOKEN}
      PYLON_DATABASE_PATH: /data/pylon.db
      PYLON_METRICS_TOKEN: ${PYLON_METRICS_TOKEN:-}
    security_opt:
      - no-new-privileges:true
    # Pylon runs as root, but operator hotkeys are normally mode 0600 and may
    # be owned by a non-root host user. Restore only the capability needed to
    # traverse/read the read-only wallet mount after dropping all capabilities.
    cap_add:
      - DAC_READ_SEARCH
    cap_drop:
      - ALL
    volumes:
      - type: bind
        source: ${DITTO_BITTENSOR_WALLETS_DIR:-~/.bittensor/wallets}
        target: /root/.bittensor/wallets
        read_only: true
        bind:
          create_host_path: false
      - pylon-data:/data

  # The scorer receives an isolated nested Docker daemon. The validator host's
  # Docker socket is never mounted, so the scorer cannot control the host daemon.
  sandbox-docker:
    build:
      context: .
      dockerfile: Dockerfile.sandbox-docker
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_HOST: tcp://127.0.0.1:2375
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - sandbox-docker-rootful-data:/var/lib/docker
    healthcheck:
      # Docker readiness alone does not prove the harness embedding route. This
      # hits the same socat listener inner containers reach through
      # host.docker.internal:11434 and exercises Ollama's loaded model.
      test:
        - CMD-SHELL
        - >-
          docker info >/dev/null 2>&1 &&
          curl --silent --show-error --max-time 10 --output /dev/null
          --write-out '%{http_code}' --request POST
          --header 'Content-Type: application/json'
          --data '{"model":"embeddinggemma","input":"health"}'
          http://127.0.0.1:11434/api/embed | grep -q '^200$$'
      interval: 10s
      timeout: 15s
      retries: 30

  # The embedding model the harness scores memory recall against. Runs on the
  # private Compose network. The sandbox-docker forwarder makes it available to
  # inner sandboxes at host.docker.internal:11434.
  ollama:
    # 0.11.10 is the first Ollama release with EmbeddingGemma support. Keep the
    # multi-arch index pinned so amd64 validators and arm64 development hosts
    # resolve reproducibly.
    image: docker.io/ollama/ollama:0.11.10@sha256:a5409cb903d30f9cd67e9f430dd336ddc9274e16fd78f75b675c42065991b4fd
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    entrypoint:
      - /bin/sh
      - -c
      - |
        /bin/ollama serve &
        until /bin/ollama list >/dev/null 2>&1; do sleep 1; done
        /bin/ollama pull embeddinggemma
        wait
    healthcheck:
      # A listed model can still be unusable (Ollama 0.6.8 pulled
      # EmbeddingGemma but returned 500 for /api/embed). Probe the capability
      # the scoring harness actually needs.
      test:
        - CMD-SHELL
        - >-
          bash -ec 'body="{\"model\":\"embeddinggemma\",\"input\":\"health\"}";
          exec 3<>/dev/tcp/127.0.0.1/11434;
          printf "POST /api/embed HTTP/1.1\r\nHost: localhost\r\nContent-Type: application/json\r\nContent-Length: %s\r\nConnection: close\r\n\r\n%s" "$${#body}" "$$body" >&3;
          head -n 1 <&3 | grep -q " 200 "'
      interval: 10s
      timeout: 15s
      retries: 30

  # The model-pinning gateway: fronts Chutes, forces the frozen Qwen3-32B model
  # and thinking mode, and keeps the Chutes key out of the sandbox. It stays on
  # the private Compose network; the forwarder exposes it only to inner sandboxes
  # at host.docker.internal:11435.
  model-relay:
    build:
      context: *dittobench-build-context
      target: relay
    restart: unless-stopped
    environment:
      RELAY_PROVIDER: ${RELAY_PROVIDER:-chutes}
      RELAY_API_KEY: ${RELAY_API_KEY:?set RELAY_API_KEY in .env}
      PORT: "11435"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  dittobench-api:
    build:
      # Pin the scorer and relay to one reviewed dittobench-api revision.
      context: *dittobench-build-context
      target: sandbox
    restart: unless-stopped
    network_mode: service:sandbox-docker
    depends_on:
      sandbox-docker:
        condition: service_healthy
      model-relay:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://127.0.0.1:2375
      HARNESS_GATEWAY_URL: http://host.docker.internal:11435
      HARNESS_EMBED_URL: http://host.docker.internal:11434
      DITTOBENCH_SANDBOX_HARDEN: "1"
      DITTOBENCH_SANDBOX_EGRESS_NETWORK: ditto-sandbox
      # Production opt-in for platform-verified screened archives. Keep the
      # broader private-harness URL bypass disabled.
      DITTOBENCH_ALLOW_SCREENED_IMAGES: "1"
      DITTOBENCH_SOFTWARE_VERSION: ${DITTOBENCH_SOFTWARE_VERSION:-source-build}
      DITTOBENCH_SOURCE_SHA: b96433d026b4d44b018051a5e85a36f17208a223
      DITTOBENCH_SANDBOX_SECCOMP_PROFILE: ${DITTOBENCH_SANDBOX_SECCOMP_PROFILE:-}
      DITTOBENCH_SANDBOX_APPARMOR_PROFILE: ${DITTOBENCH_SANDBOX_APPARMOR_PROFILE:-}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  ditto-subnet:
    # Local builds remain the default operator path. The opt-in updater passes
    # an immutable GHCR digest explicitly and overrides this build policy.
    image: ${DITTO_SUBNET_IMAGE:-ditto-subnet-validator:local}
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DITTO_REVISION: ${DITTO_SOURCE_REVISION:-local}
        VALIDATOR_COMPATIBILITY_EPOCH: "2"
        VALIDATOR_HEARTBEAT_PROTOCOL: "9"
    restart: unless-stopped
    stop_grace_period: 80m
    labels:
      io.heyditto.validator.auto-update-target: "true"
    environment:
      NETUID: "118"
      SUBTENSOR_NETWORK: ${SUBTENSOR_NETWORK:-finney}
      VALIDATOR_PLATFORM_API_URL: ${VALIDATOR_PLATFORM_API_URL}
      VALIDATOR_DITTOBENCH_API_URL: http://sandbox-docker:8000
      VALIDATOR_DITTOBENCH_CAPABILITIES_TIMEOUT_SECONDS: "3"
      # Same sandbox-docker:11434 listener reached from inner miner harnesses as
      # host.docker.internal:11434. The worker probes it before claiming a lease.
      VALIDATOR_EMBED_PREFLIGHT_URL: http://sandbox-docker:11434/api/embed
      VALIDATOR_EMBED_PREFLIGHT_TIMEOUT_SECONDS: "5"
      # Heartbeat v9 per-component health probes. Private-network URLs only —
      # they are configuration, never part of the public payload. The sandbox
      # probe exercises the same harness-facing forwarder listener that inner
      # sandboxes reach as host.docker.internal:11434.
      VALIDATOR_SANDBOX_DOCKER_PROBE_URL: http://sandbox-docker:11434/
      VALIDATOR_MODEL_RELAY_PROBE_URL: http://model-relay:11435/
      VALIDATOR_STACK_PROBE_TIMEOUT_SECONDS: "2"
      VALIDATOR_STACK_HEALTH_CACHE_SECONDS: "60"
      VALIDATOR_HOTKEY: ${VALIDATOR_HOTKEY}
      VALIDATOR_WALLET_NAME: ${VALIDATOR_WALLET_NAME}
      VALIDATOR_WALLET_HOTKEY: ${VALIDATOR_WALLET_HOTKEY}
      PYLON_URL: http://pylon:8000
      PYLON_IDENTITY_NAME: ditto
      PYLON_TOKEN: ${PYLON_TOKEN}
      VALIDATOR_RUN_SIZE: "full"
      VALIDATOR_SWEEP_SECONDS: "120"
      VALIDATOR_EPOCH_SECONDS: "3600"
      VALIDATOR_QUEUE_LIMIT: "50"
      VALIDATOR_DITTOBENCH_POLL_SECONDS: "10"
      VALIDATOR_DITTOBENCH_TIMEOUT_SECONDS: "4500"
      VALIDATOR_EXPECTED_COMPATIBILITY_EPOCH: "2"
      # Source/manual installs must never inherit managed-release identity from
      # an operator shell or .env file. The immutable release renderer replaces
      # this with authenticated descriptor values for managed stacks.
      # v2 retains source-build fallback; v3 requires screened images by contract.
      VALIDATOR_SCREENED_IMAGES: "1"
      VALIDATOR_SANDBOX_EGRESS_RESTRICTED: "1"
      VALIDATOR_EXECUTOR_ISOLATION: privileged_dind
      VALIDATOR_STACK_UPDATER: ${VALIDATOR_STACK_AUTO_UPDATE:-false}
      VALIDATOR_STACK_MODE: source
      VALIDATOR_STACK_COMPOSE_SCHEMA: "1"
      VALIDATOR_STACK_COMPONENT_DITTO_SUBNET: ${DITTO_SOURCE_IDENTITY:-version:source-build}
      VALIDATOR_STACK_COMPONENT_DITTOBENCH_API: source:b96433d026b4d44b018051a5e85a36f17208a223
      VALIDATOR_STACK_COMPONENT_SANDBOX_DOCKER: ${DITTO_SOURCE_IDENTITY:-version:source-build}
      VALIDATOR_STACK_COMPONENT_MODEL_RELAY: source:b96433d026b4d44b018051a5e85a36f17208a223
      VALIDATOR_STACK_COMPONENT_PYLON: docker.io/backenddevelopersltd/bittensor-pylon@sha256:ba6ba5e3e7b32683f90039eb5a37a565d5479f034326b40288869f826f7362c7
      VALIDATOR_STACK_COMPONENT_OLLAMA: docker.io/ollama/ollama@sha256:a5409cb903d30f9cd67e9f430dd336ddc9274e16fd78f75b675c42065991b4fd
      VALIDATOR_START_DRAINED: ${VALIDATOR_START_DRAINED:-false}
      VALIDATOR_BOOTSTRAP_TOKEN: ${VALIDATOR_BOOTSTRAP_TOKEN:-manual}
      VALIDATOR_HTTP_TIMEOUT_SECONDS: "30"
      VALIDATOR_MIN_STAKE_TAO: "0"
      VALIDATOR_DITTOBENCH_MOCK: "false"
      VALIDATOR_LOG_LEVEL: ${VALIDATOR_LOG_LEVEL:-INFO}
      WANDB_MODE: ${WANDB_MODE:-disabled}
      WANDB_PROJECT: ${WANDB_PROJECT:-ditto-sn118}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      WANDB_RUN_NAME: ${WANDB_RUN_NAME:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_DIR: /tmp/wandb
      WANDB_DATA_DIR: /tmp/wandb-data
      WANDB_CACHE_DIR: /tmp/wandb-cache
      UV_CACHE_DIR: /tmp/uv-cache
    depends_on:
      pylon:
        condition: service_started
      dittobench-api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
      # bittensor creates runtime directories (miners, metagraphs) on import;
      # keep them ephemeral while the wallet bind mount below stays read-only.
      - /root/.bittensor
    security_opt:
      - no-new-privileges:true
    # The validator runs as root, but the host-owned hotkey is mode 0600.
    # Restore read/search permission bypass only for this read-only key mount.
    cap_add:
      - DAC_READ_SEARCH
    cap_drop:
      - ALL
    volumes:
      # The root filesystem stays read-only. The updater gives every forced
      # candidate/rollback recreation a new token, so only that container's
      # successful USR2 acknowledgement survives a Docker/host restart.
      - type: volume
        source: validator-update-bootstrap
        target: /var/lib/ditto-validator-update
        read_only: false
      - type: bind
        source: ${DITTO_BITTENSOR_WALLETS_DIR:-~/.bittensor/wallets}/${VALIDATOR_WALLET_NAME}/hotkeys/${VALIDATOR_WALLET_HOTKEY}
        target: /root/.bittensor/wallets/${VALIDATOR_WALLET_NAME}/hotkeys/${VALIDATOR_WALLET_HOTKEY}
        read_only: true
        bind:
          create_host_path: false

volumes:
  pylon-data:
  sandbox-docker-rootful-data:
  ollama-data:
  validator-update-bootstrap:
