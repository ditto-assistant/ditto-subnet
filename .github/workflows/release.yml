name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.semantic-release.outputs.released || 'false' }}
      version: ${{ steps.semantic-release.outputs.version }}
      tag: ${{ steps.semantic-release.outputs.tag }}
      commit_sha: ${{ steps.semantic-release.outputs.commit_sha }}
    steps:
      - name: Check out the merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Pin the release branch to the tested merge
        run: git reset --hard "${{ github.sha }}"

      - name: Configure the release committer
        run: |
          git config user.name github-actions
          git config user.email actions@users.noreply.github.com

      # The code already reported 0.1.0 before release automation existed.
      # Anchor that historical version to the parent of this first release-aware
      # merge so the setup feature itself advances the project to 0.2.0.
      - name: Bootstrap the existing v0.1.0 baseline
        run: |
          if ! git tag --list 'v[0-9]*' | grep -q .; then
            release_setup_commit=$(git log --diff-filter=A --format=%H -- \
              .github/workflows/release.yml | tail -1)
            baseline_commit=$(git rev-parse "${release_setup_commit}^")
            git tag --annotate v0.1.0 "$baseline_commit" \
              --message "Ditto Subnet v0.1.0"
            git push origin v0.1.0
          fi

      - name: Version, tag, and create the GitHub release
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@8f4d8c4e3e4fcd2b8df16444b148aa49920cc4d3
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com

  publish-validator-image:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/ditto-assistant/ditto-subnet-validator
      COMPATIBILITY_EPOCH: "2"
    steps:
      - name: Check out the exact release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release.outputs.commit_sha }}
          persist-credentials: false

      # Release commits use [skip ci], so repeat the complete code checks on the
      # exact source that will be published instead of trusting the parent run.
      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Verify the exact release source
        run: |
          uv sync --group dev
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy ditto/
          uv run pytest
          uv run pytest -m integration ditto/tests/test_validator_auto_update.py

      - name: Set up QEMU for both release platforms
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish the immutable source manifest once
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DITTO_VERSION=${{ needs.release.outputs.version }}
            DITTO_REVISION=${{ needs.release.outputs.commit_sha }}
            VALIDATOR_COMPATIBILITY_EPOCH=${{ env.COMPATIBILITY_EPOCH }}
            VALIDATOR_HEARTBEAT_PROTOCOL=6
          tags: |
            ${{ env.IMAGE }}:sha-${{ needs.release.outputs.commit_sha }}

      - name: Smoke-test both registry artifacts by exact manifest digest
        id: registry-smoke
        env:
          VERSION: ${{ needs.release.outputs.version }}
          REVISION: ${{ needs.release.outputs.commit_sha }}
        run: |
          candidate="$IMAGE:sha-$REVISION"
          manifest_digest="$(
            docker buildx imagetools inspect "$candidate" \
              --format '{{json .Manifest}}' | jq -r .digest
          )"
          [[ "$manifest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          exact="$IMAGE@$manifest_digest"
          raw_manifest="$(docker buildx imagetools inspect --raw "$exact")"
          for platform in linux/amd64 linux/arm64; do
            os="${platform%/*}"
            architecture="${platform#*/}"
            child_digest="$(
              jq -er \
                --arg os "$os" \
                --arg architecture "$architecture" \
                '[.manifests[]
                  | select(
                      .platform.os == $os
                      and .platform.architecture == $architecture
                    )]
                 | if length == 1
                   then .[0].digest
                   else error("expected exactly one matching platform manifest")
                   end' <<<"$raw_manifest"
            )"
            [[ "$child_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
            child_exact="$IMAGE@$child_digest"
            suffix="${platform#linux/}"
            bootstrap_volume="ditto-validator-bootstrap-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${suffix}"
            docker pull "$child_exact"
            test "$(docker image inspect --format '{{ index .Config.Labels "io.heyditto.validator.compatibility-epoch" }}' "$child_exact")" = "$COMPATIBILITY_EPOCH"
            test "$(docker image inspect --format '{{ index .Config.Labels "io.heyditto.validator.heartbeat-protocol" }}' "$child_exact")" = "6"
            test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' "$child_exact")" = "$VERSION"
            test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$child_exact")" = "$REVISION"
            docker volume create "$bootstrap_volume"
            trap 'docker volume rm -f "$bootstrap_volume" >/dev/null' EXIT
            docker run --rm --platform "$platform" --read-only --tmpfs /tmp \
              --cap-drop ALL --cap-add DAC_READ_SEARCH \
              --mount "type=volume,source=$bootstrap_volume,target=/var/lib/ditto-validator-update" \
              --env UV_CACHE_DIR=/tmp/uv-cache \
              --env VALIDATOR_BOOTSTRAP_TOKEN=release-smoke \
              --entrypoint uv "$child_exact" run --no-sync python -c \
              'from ditto.validator.update_control import bootstrap_should_start_drained as s, mark_bootstrap_resumed as m; assert s(True); assert m(); assert not s(True)'
            docker run --rm --platform "$platform" --read-only --tmpfs /tmp \
              --cap-drop ALL --cap-add DAC_READ_SEARCH \
              --mount "type=volume,source=$bootstrap_volume,target=/var/lib/ditto-validator-update" \
              --env UV_CACHE_DIR=/tmp/uv-cache \
              --env VALIDATOR_BOOTSTRAP_TOKEN=release-smoke \
              --entrypoint uv "$child_exact" run --no-sync python -c \
              'from ditto.validator.update_control import bootstrap_should_start_drained as s; assert not s(True)'
            docker run --rm --platform "$platform" --read-only --tmpfs /tmp \
              --cap-drop ALL --cap-add DAC_READ_SEARCH \
              --mount "type=volume,source=$bootstrap_volume,target=/var/lib/ditto-validator-update" \
              --env UV_CACHE_DIR=/tmp/uv-cache \
              --env VALIDATOR_BOOTSTRAP_TOKEN=release-smoke-next \
              --entrypoint uv "$child_exact" run --no-sync python -c \
              'from ditto.validator.update_control import bootstrap_should_start_drained as s; assert s(True)'
            docker volume rm -f "$bootstrap_volume" >/dev/null
            trap - EXIT
          done
          printf 'digest=%s\n' "$manifest_digest" >>"$GITHUB_OUTPUT"

      - name: Promote only the tested manifest
        env:
          MANIFEST_DIGEST: ${{ steps.registry-smoke.outputs.digest }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        run: |
          source="$IMAGE@$MANIFEST_DIGEST"
          docker buildx imagetools create \
            --tag "$IMAGE:$RELEASE_TAG" \
            --tag "$IMAGE:compat-$COMPATIBILITY_EPOCH" \
            "$source"
          for tag in "$RELEASE_TAG" "compat-$COMPATIBILITY_EPOCH"; do
            promoted="$(
              docker buildx imagetools inspect "$IMAGE:$tag" \
                --format '{{json .Manifest}}' | jq -r .digest
            )"
            test "$promoted" = "$MANIFEST_DIGEST"
          done
