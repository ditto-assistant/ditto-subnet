name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Pin the release branch to the tested merge
        run: git reset --hard "${{ github.sha }}"

      - name: Configure the release committer
        run: |
          git config user.name github-actions
          git config user.email actions@users.noreply.github.com

      # The code already reported 0.1.0 before release automation existed.
      # Anchor that historical version to the parent of this first release-aware
      # merge so the setup feature itself advances the project to 0.2.0.
      - name: Bootstrap the existing v0.1.0 baseline
        run: |
          if ! git tag --list 'v[0-9]*' | grep -q .; then
            release_setup_commit=$(git log --diff-filter=A --format=%H -- \
              .github/workflows/release.yml | tail -1)
            baseline_commit=$(git rev-parse "${release_setup_commit}^")
            git tag --annotate v0.1.0 "$baseline_commit" \
              --message "Ditto Subnet v0.1.0"
            git push origin v0.1.0
          fi

      - name: Configure private dependency access
        env:
          DITTO_SCREENER_PROTOCOL_READ_KEY: ${{ secrets.DITTO_SCREENER_PROTOCOL_READ_KEY }}
        run: |
          : "${DITTO_SCREENER_PROTOCOL_READ_KEY:?missing read-only screener protocol deploy key}"
          key_file="$RUNNER_TEMP/ditto-screener-read-key"
          printf '%s\n' "$DITTO_SCREENER_PROTOCOL_READ_KEY" > "$key_file"
          chmod 600 "$key_file"

      - name: Version, tag, and create the GitHub release
        uses: python-semantic-release/python-semantic-release@8f4d8c4e3e4fcd2b8df16444b148aa49920cc4d3
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: url.git@github.com:ditto-assistant/ditto-screener.git.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/ditto-assistant/ditto-screener.git
          GIT_SSH_COMMAND: >-
            ssh -i /github/runner_temp/ditto-screener-read-key
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com

      - name: Remove private dependency key
        if: always()
        run: rm -f "$RUNNER_TEMP/ditto-screener-read-key"
