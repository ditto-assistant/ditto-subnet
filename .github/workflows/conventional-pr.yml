name: Conventional PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  title:
    runs-on: ubuntu-latest
    steps:
      - name: Require a release-aware squash title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^(fix|feat|chore)(\([^\)]+\))?\!?:\ .+ ]]; then
            echo "PR titles must start with fix:, feat:, or chore: (optional scope and ! are supported)."
            exit 1
          fi
