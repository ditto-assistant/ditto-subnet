name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        env:
          DITTO_SCREENER_PROTOCOL_READ_KEY: ${{ secrets.DITTO_SCREENER_PROTOCOL_READ_KEY }}
        run: |
          : "${DITTO_SCREENER_PROTOCOL_READ_KEY:?missing read-only screener protocol deploy key}"
          key_file="$(mktemp)"
          cleanup() {
            rm -f "$key_file"
            git config --global --unset-all \
              url."git@github.com:ditto-assistant/ditto-screener.git".insteadOf || true
          }
          trap cleanup EXIT

          printf '%s\n' "$DITTO_SCREENER_PROTOCOL_READ_KEY" > "$key_file"
          chmod 600 "$key_file"
          git config --global \
            url."git@github.com:ditto-assistant/ditto-screener.git".insteadOf \
            "https://github.com/ditto-assistant/ditto-screener.git"

          GIT_SSH_COMMAND="ssh -i $key_file -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            uv sync --group dev

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy ditto/

      - name: pytest
        run: uv run pytest
