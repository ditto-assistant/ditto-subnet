name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy ditto/

      - name: pytest
        run: uv run pytest

  screener-canary-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check out canonical DittoBench starter kit
        uses: actions/checkout@v4
        with:
          repository: ditto-assistant/dittobench-starter-kit
          ref: 959cd69a1a8d3b0defbfb8296518adb7d4f17c14
          path: dittobench-starter-kit

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run real Docker model-call canary
        env:
          DITTO_STARTER_KIT_DIR: ${{ github.workspace }}/dittobench-starter-kit
        run: >-
          uv run pytest -m integration
          ditto/tests/screener/test_gate_docker_integration.py -vv
