# Pylon weight-setting service for one SN118 validator. See VALIDATOR.md, "Set up
# Pylon". Copy pylon.env.example to pylon.env, fill it in (never commit it), then:
#   docker compose up -d
services:
  pylon:
    image: docker.io/backenddevelopersltd/bittensor-pylon:latest # pin to a released tag in production
    restart: unless-stopped
    env_file: ./pylon.env
    ports:
      - "8000:8000"
    volumes:
      # Pylon reads the validator hotkey to sign put_weights; read-only is enough.
      - ~/.bittensor/wallets/:/root/.bittensor/wallets:ro
      # Persist in-flight weight submissions so a restart resumes them.
      - pylon-data:/data

volumes:
  pylon-data:
