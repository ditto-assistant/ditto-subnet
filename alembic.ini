[alembic]
# Path to migration scripts, relative to this file.
script_location = %(here)s/alembic

# Prepend the project root to sys.path so env.py can import project modules.
prepend_sys_path = .

# Migration file naming: YYYY_MM_DD_<slug>.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(slug)s
truncate_slug_length = 40

path_separator = os

# Database URL is set dynamically in env.py from POSTGRES_* env vars.
sqlalchemy.url =

# Minimal logging config required by fileConfig() in env.py.
[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
